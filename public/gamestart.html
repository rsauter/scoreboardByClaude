<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matchuhr – Spielstart</title>
<link rel="stylesheet" href="/style.css">
<script src="/app.js"></script>
<style>
  /* ─── Gamestart-spezifisch ────────────────────────────────────────────────── */
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .card { width: 100%; max-width: 680px; margin-bottom: 16px; border-radius: 12px; padding: 20px; }
  .teams-row { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 10px; align-items: end; }
  .vs { text-align: center; font-size: 1.2rem; font-weight: bold; color: #aaa; padding-bottom: 8px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; position: relative; }
  .actions { display: flex; gap: 10px; max-width: 680px; width: 100%; }
  .actions .btn { flex: 1; }
  input[type=text] { padding: 8px 10px; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="status-bar" id="conn-status">Verbinde...</div>

<div class="nav-links">
  <a href="/manager.html">⚙️ Stammdaten verwalten</a>
  <a href="/operator.html">🎮 Direkt zum Operator</a>
</div>

<h1 class="large">🏒 Spielstart</h1>
<p class="subtitle">Konfiguriere das Spiel und starte dann die Uhr im Operator.</p>

<div class="card">
  <h2>Teams</h2>
  <div class="teams-row">
    <div class="field-group" id="home-group">
      <label>Heim-Team</label>
      <input type="text" id="cfg-home" placeholder="Teamname oder frei eingeben" autocomplete="off" oninput="onTeamInput('home')">
      <div class="autocomplete-list" id="home-suggestions" style="display:none"></div>
    </div>
    <div class="vs">vs</div>
    <div class="field-group" id="away-group">
      <label>Gast-Team</label>
      <input type="text" id="cfg-away" placeholder="Teamname oder frei eingeben" autocomplete="off" oninput="onTeamInput('away')">
      <div class="autocomplete-list" id="away-suggestions" style="display:none"></div>
    </div>
  </div>
</div>

<div class="card">
  <h2>Spielmodus</h2>
  <div class="form-row-3">
    <div>
      <label>Spielmodus</label>
      <select id="cfg-mode">
        <option value="1x24">1 × 24 min (E-Junioren)</option>
        <option value="2x20">2 × 20 min (Halbzeiten)</option>
        <option value="3x20" selected>3 × 20 min (Dritteln)</option>
      </select>
    </div>
    <div>
      <label>Pause</label>
      <select id="cfg-break">
        <option value="300">5 min</option>
        <option value="600" selected>10 min</option>
        <option value="900">15 min</option>
      </select>
    </div>
    <div>
      <label>Verlängerung</label>
      <select id="cfg-ot">
        <option value="300" selected>5 min Sudden Death</option>
        <option value="600">10 min Sudden Death</option>
      </select>
    </div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-green btn-large" onclick="startGame()">▶ Spiel starten</button>
</div>
<p class="hint">Du wirst nach dem Start zum Operator weitergeleitet.</p>

<script>
  const ws = new WebSocket(`ws://${location.host}`);
  let knownTeams = [];

  ws.onopen  = () => updateStatusBar('🟢 Verbunden');
  ws.onclose = () => updateStatusBar('🔴 Getrennt – Seite neu laden');

  async function loadTeams() {
    try {
      const res = await fetch('/api/teams');
      if (res.ok) knownTeams = await res.json();
    } catch(e) {}
  }
  loadTeams();

  function onTeamInput(side) {
    const inputEl   = document.getElementById(`cfg-${side}`);
    const suggestEl = document.getElementById(`${side}-suggestions`);
    const val = inputEl.value.trim().toLowerCase();
    if (!val || knownTeams.length === 0) { suggestEl.style.display = 'none'; return; }
    
    const matches = knownTeams.filter(
      t => t.name.toLowerCase().includes(val) ||
      t.abbreviation.toLowerCase().includes(val) ||
      t.organization.toLowerCase().includes(val)
     );
    
    if (matches.length === 0) { suggestEl.style.display = 'none'; return; }
    suggestEl.innerHTML = matches.map(
      t => `<div onclick="selectTeam('${side}','${t.abbreviation.replace(/'/g,"\\'")}')"> ${t.abbreviation}</div>`).join('');
    suggestEl.style.display = 'block';
  }

  function selectTeam(side, name) {
    document.getElementById(`cfg-${side}`).value = name;
    document.getElementById(`${side}-suggestions`).style.display = 'none';
  }

  document.addEventListener('click', e => {
    ['home','away'].forEach(side => {
      const group = document.getElementById(`${side}-group`);
      if (!group.contains(e.target)) document.getElementById(`${side}-suggestions`).style.display = 'none';
    });
  });

  function startGame() {
    const homeTeam      = document.getElementById('cfg-home').value.trim() || 'Heim';
    const awayTeam      = document.getElementById('cfg-away').value.trim() || 'Gast';
    const gameMode      = document.getElementById('cfg-mode').value;
    const breakDuration = parseInt(document.getElementById('cfg-break').value);
    const otDuration    = parseInt(document.getElementById('cfg-ot').value);
    ws.send(JSON.stringify({ cmd:'SET_CONFIG', homeTeam, awayTeam, gameMode, breakDuration, otDuration }));
    setTimeout(() => { window.location.href = '/operator.html'; }, 200);
  }
</script>
</body>
</html>
