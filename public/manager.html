<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matchuhr – Manager</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/style.css">
<script src="/app.js"></script>
</head>
<body class="bg-base-300 p-4">

  <div id="conn-status" class="alert alert-info py-1 px-4 text-sm mb-4 justify-center">Verbinde...</div>

  <div class="flex gap-6 mb-5 text-sm">
    <a href="/gamestart.html" class="link link-primary">🏒 Spielstart</a>
    <a href="/operator.html" class="link link-primary">🎮 Operator</a>
  </div>

  <div class="flex items-center justify-between mb-5">
    <h1 class="text-2xl font-bold text-primary">⚙️ Stammdaten</h1>
    <button onclick="openModal()" class="btn btn-primary btn-sm">+ Neu</button>
  </div>

  <!-- Tabs -->
  <div role="tablist" class="tabs tabs-bordered mb-4">
    <button role="tab" id="tab-teams-btn" class="tab tab-active" onclick="showTab('teams', this)">Teams</button>
    <button role="tab" class="tab tab-disabled" disabled title="Kommt später">Spieler</button>
  </div>

  <!-- Teams-Tabelle -->
  <div id="tab-teams" class="card bg-base-100 shadow overflow-x-auto">
    <table class="table table-sm">
      <thead>
        <tr class="text-xs text-base-content/50 uppercase tracking-wider">
          <th>Name</th>
          <th>Kürzel</th>
          <th>Organisation</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="team-table-body">
        <tr><td colspan="4" class="text-center py-10 text-base-content/30">Noch keine Teams erfasst.</td></tr>
      </tbody>
    </table>
  </div>

  <!-- DaisyUI Modal -->
  <dialog id="team-modal" class="modal">
    <div class="modal-box max-w-md">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-3 top-3">✕</button>
      </form>
      <h3 class="font-bold text-lg mb-5" id="modal-title">Team erfassen</h3>

      <input type="hidden" id="modal-id">

      <div class="mb-3">
        <label class="label py-0 mb-1"><span class="label-text text-xs">Name *</span></label>
        <input type="text" id="modal-name" placeholder="z.B. D Orange" class="input input-bordered input-sm w-full">
      </div>
      <div class="mb-3">
        <label class="label py-0 mb-1"><span class="label-text text-xs">Kürzel</span></label>
        <input type="text" id="modal-abbr" placeholder="z.B. DOR" maxlength="5" class="input input-bordered input-sm w-full">
      </div>
      <div class="mb-3">
        <label class="label py-0 mb-1"><span class="label-text text-xs">Farbe</span></label>
        <div class="flex gap-2 items-center">
          <input type="color" id="modal-color-picker" value="#00d4ff" oninput="syncColorHex()"
            class="w-11 h-9 rounded border border-base-content/20 bg-base-200 cursor-pointer p-0.5 shrink-0">
          <input type="text" id="modal-color-hex" value="#00d4ff" placeholder="#00d4ff"
            oninput="syncColorPicker()" class="input input-bordered input-sm flex-1">
        </div>
      </div>
      <div class="mb-1">
        <label class="label py-0 mb-1"><span class="label-text text-xs">Organisation</span></label>
        <input type="text" id="modal-org" placeholder="z.B. Hornets" class="input input-bordered input-sm w-full">
      </div>
      <div id="modal-error" class="text-error text-sm mt-2 hidden">Name ist Pflichtfeld.</div>

      <div class="modal-action">
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-success btn-sm" onclick="saveTeam()">Speichern</button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

<script>
  let teams = [];
  updateStatusBar();

  async function loadTeams() {
    const res = await fetch('/api/teams');
    teams = await res.json();
    renderTable();
  }

  async function saveTeam() {
    const id    = document.getElementById('modal-id').value;
    const name  = document.getElementById('modal-name').value.trim();
    const abbr  = document.getElementById('modal-abbr').value.trim().toUpperCase();
    const color = document.getElementById('modal-color-hex').value.trim() || '#00d4ff';
    const org   = document.getElementById('modal-org').value.trim();

    if (!name) {
      document.getElementById('modal-error').classList.remove('hidden');
      return;
    }

    const body    = JSON.stringify({ name, abbreviation: abbr, color, organization: org });
    const headers = { 'Content-Type': 'application/json' };

    if (id) {
      await fetch(`/api/teams/${id}`, { method: 'PUT', headers, body });
    } else {
      await fetch('/api/teams', { method: 'POST', headers, body });
    }

    closeModal();
    loadTeams();
  }

  async function deleteTeam(id, name) {
    if (!confirm(`Team "${name}" wirklich löschen?`)) return;
    await fetch(`/api/teams/${id}`, { method: 'DELETE' });
    loadTeams();
  }

  function renderTable() {
    const tbody = document.getElementById('team-table-body');
    if (teams.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-base-content/30">Noch keine Teams erfasst.</td></tr>';
      return;
    }
    tbody.innerHTML = teams.map(t => `
      <tr class="hover">
        <td>
          <span class="inline-block w-3.5 h-3.5 rounded-full mr-2 align-middle border border-white/20"
            style="background:${t.color}"></span>
          ${esc(t.name)}
        </td>
        <td>
          ${t.abbreviation
            ? `<span class="badge badge-outline badge-primary text-xs font-bold tracking-wider">${esc(t.abbreviation)}</span>`
            : '–'}
        </td>
        <td>${esc(t.organization) || '–'}</td>
        <td>
          <div class="flex gap-1 justify-end">
            <button class="btn btn-primary btn-xs" onclick="openModal(${t.id})">✏️</button>
            <button class="btn btn-error btn-xs" onclick="deleteTeam(${t.id}, '${esc(t.name)}')">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function openModal(id = null) {
    document.getElementById('modal-error').classList.add('hidden');
    if (id) {
      const t = teams.find(t => t.id === id);
      document.getElementById('modal-title').textContent       = 'Team bearbeiten';
      document.getElementById('modal-id').value                = t.id;
      document.getElementById('modal-name').value              = t.name;
      document.getElementById('modal-abbr').value              = t.abbreviation;
      document.getElementById('modal-color-picker').value      = t.color;
      document.getElementById('modal-color-hex').value         = t.color;
      document.getElementById('modal-org').value               = t.organization;
    } else {
      document.getElementById('modal-title').textContent       = 'Team erfassen';
      document.getElementById('modal-id').value                = '';
      document.getElementById('modal-name').value              = '';
      document.getElementById('modal-abbr').value              = '';
      document.getElementById('modal-color-picker').value      = '#00d4ff';
      document.getElementById('modal-color-hex').value         = '#00d4ff';
      document.getElementById('modal-org').value               = '';
    }
    document.getElementById('team-modal').showModal();
    setTimeout(() => document.getElementById('modal-name').focus(), 50);
  }

  function closeModal() {
    document.getElementById('team-modal').close();
  }

  function syncColorHex() {
    document.getElementById('modal-color-hex').value = document.getElementById('modal-color-picker').value;
  }
  function syncColorPicker() {
    const hex = document.getElementById('modal-color-hex').value;
    if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
      document.getElementById('modal-color-picker').value = hex;
    }
  }

  function showTab(tab, el) {
    document.querySelectorAll('[role=tab]').forEach(t => t.classList.remove('tab-active'));
    el.classList.add('tab-active');
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  loadTeams();
</script>
</body>
</html>
