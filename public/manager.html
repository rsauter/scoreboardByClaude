<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matchuhr – Manager</title>
<link rel="stylesheet" href="/style.css">
<style>
  /* ─── Manager-spezifisch ──────────────────────────────────────────────────── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .page-header h1 { margin-bottom: 0; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab {
    padding: 8px 18px;
    border: none;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: bold;
    background: #0f3460;
    color: #aaa;
    border-bottom: 2px solid transparent;
  }
  .tab.active { background: #16213e; color: #00d4ff; border-bottom: 2px solid #00d4ff; }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-size: 0.75rem;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #0f3460;
  }
  .data-table td {
    padding: 10px 12px;
    border-bottom: 1px solid #0f3460;
    font-size: 0.88rem;
    vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #1a2a4e; }

  .color-dot {
    display: inline-block;
    width: 14px; height: 14px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .abbr-badge {
    background: #0f3460;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 0.78rem;
    font-weight: bold;
    color: #74b9ff;
    letter-spacing: 1px;
  }
  .actions-cell { display: flex; gap: 6px; justify-content: flex-end; }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: #636e72;
    font-size: 0.9rem;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #16213e;
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-header h2 { font-size: 1rem; color: #eee; }
  .modal-close {
    background: none;
    border: none;
    color: #aaa;
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: #eee; }
  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* Color field */
  .color-row { display: flex; gap: 10px; align-items: center; }
  input[type=color] {
    width: 44px; height: 36px;
    border: 1px solid #0984e3;
    border-radius: 6px;
    background: #0f3460;
    cursor: pointer;
    padding: 2px;
    flex-shrink: 0;
  }
  .color-hex { flex: 1; }

  .error-msg { color: #ff7675; font-size: 0.8rem; margin-top: 8px; display: none; }
</style>
</head>
<body>

<div class="nav-links">
  <a href="/gamestart.html">🏒 Spielstart</a>
  <a href="/operator.html">🎮 Operator</a>
</div>

<div class="page-header">
  <h1>⚙️ Stammdaten</h1>
  <button class="btn btn-blue btn-sm" onclick="openModal()">+ Neu</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('teams')">Teams</button>
  <button class="tab" onclick="showTab('players')" disabled title="Kommt später">Spieler</button>
</div>

<div class="card" id="tab-teams">
  <table class="data-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Kürzel</th>
        <th>Organisation</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="team-table-body">
      <tr><td colspan="4" class="empty-state">Noch keine Teams erfasst.</td></tr>
    </tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Team erfassen</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <input type="hidden" id="modal-id">

    <div style="margin-bottom:12px">
      <label>Name *</label>
      <input type="text" id="modal-name" placeholder="z.B. D Orange">
    </div>
    <div style="margin-bottom:12px">
      <label>Kürzel</label>
      <input type="text" id="modal-abbr" placeholder="z.B. DOR" maxlength="5">
    </div>
    <div style="margin-bottom:12px">
      <label>Farbe</label>
      <div class="color-row">
        <input type="color" id="modal-color-picker" value="#00d4ff" oninput="syncColorHex()">
        <input type="text" id="modal-color-hex" class="color-hex" value="#00d4ff" placeholder="#00d4ff" oninput="syncColorPicker()">
      </div>
    </div>
    <div style="margin-bottom:4px">
      <label>Organisation</label>
      <input type="text" id="modal-org" placeholder="z.B. Hornets">
    </div>
    <div class="error-msg" id="modal-error">Name ist Pflichtfeld.</div>

    <div class="modal-footer">
      <button class="btn btn-gray btn-sm" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-green btn-sm" onclick="saveTeam()">Speichern</button>
    </div>
  </div>
</div>

<script>
  let teams = [];

  // ─── API ────────────────────────────────────────────────────────────────────
  async function loadTeams() {
    const res = await fetch('/api/teams');
    teams = await res.json();
    renderTable();
  }

  async function saveTeam() {
    const id   = document.getElementById('modal-id').value;
    const name = document.getElementById('modal-name').value.trim();
    const abbr = document.getElementById('modal-abbr').value.trim().toUpperCase();
    const color = document.getElementById('modal-color-hex').value.trim() || '#00d4ff';
    const org  = document.getElementById('modal-org').value.trim();

    if (!name) {
      document.getElementById('modal-error').style.display = 'block';
      return;
    }

    const body = JSON.stringify({ name, abbreviation: abbr, color, organization: org });
    const headers = { 'Content-Type': 'application/json' };

    if (id) {
      await fetch(`/api/teams/${id}`, { method: 'PUT', headers, body });
    } else {
      await fetch('/api/teams', { method: 'POST', headers, body });
    }

    closeModal();
    loadTeams();
  }

  async function deleteTeam(id, name) {
    if (!confirm(`Team "${name}" wirklich löschen?`)) return;
    await fetch(`/api/teams/${id}`, { method: 'DELETE' });
    loadTeams();
  }

  // ─── Render ─────────────────────────────────────────────────────────────────
  function renderTable() {
    const tbody = document.getElementById('team-table-body');
    if (teams.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Noch keine Teams erfasst.</td></tr>';
      return;
    }
    tbody.innerHTML = teams.map(t => `
      <tr>
        <td>
          <span class="color-dot" style="background:${t.color}"></span>
          ${esc(t.name)}
        </td>
        <td>${t.abbreviation ? `<span class="abbr-badge">${esc(t.abbreviation)}</span>` : '–'}</td>
        <td>${esc(t.organization) || '–'}</td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-blue btn-xs" onclick="openModal(${t.id})">✏️</button>
            <button class="btn btn-red btn-xs" onclick="deleteTeam(${t.id}, '${esc(t.name)}')">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ─── Modal ──────────────────────────────────────────────────────────────────
  function openModal(id = null) {
    document.getElementById('modal-error').style.display = 'none';
    if (id) {
      const t = teams.find(t => t.id === id);
      document.getElementById('modal-title').textContent = 'Team bearbeiten';
      document.getElementById('modal-id').value    = t.id;
      document.getElementById('modal-name').value  = t.name;
      document.getElementById('modal-abbr').value  = t.abbreviation;
      document.getElementById('modal-color-picker').value = t.color;
      document.getElementById('modal-color-hex').value    = t.color;
      document.getElementById('modal-org').value   = t.organization;
    } else {
      document.getElementById('modal-title').textContent = 'Team erfassen';
      document.getElementById('modal-id').value    = '';
      document.getElementById('modal-name').value  = '';
      document.getElementById('modal-abbr').value  = '';
      document.getElementById('modal-color-picker').value = '#00d4ff';
      document.getElementById('modal-color-hex').value    = '#00d4ff';
      document.getElementById('modal-org').value   = '';
    }
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-name').focus();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function onOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  // ─── Color sync ─────────────────────────────────────────────────────────────
  function syncColorHex() {
    document.getElementById('modal-color-hex').value = document.getElementById('modal-color-picker').value;
  }
  function syncColorPicker() {
    const hex = document.getElementById('modal-color-hex').value;
    if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
      document.getElementById('modal-color-picker').value = hex;
    }
  }

  // ─── Tabs ───────────────────────────────────────────────────────────────────
  function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
  }

  // ─── Utils ──────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Keyboard: ESC schliesst Modal
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  loadTeams();
</script>
</body>
</html>
